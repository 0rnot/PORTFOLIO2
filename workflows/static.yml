name: Deploy static content to Pages

on:
  push:
    branches: ["main"] # もしデフォルトブランチがmasterの場合は "master" に変更してください
  workflow_dispatch:

# ここでデプロイに必要な権限を付与しています
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリの一番上の階層（index.htmlがある場所）を指定しています
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
